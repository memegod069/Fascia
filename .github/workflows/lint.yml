name: Lint & Smoke

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  python-checks:
    name: Python syntax + smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile fascia_addon.py
          echo "✅ Syntax OK"

      - name: Run pure-function smoke tests
        run: |
          python tests/smoke_test.py
          echo "✅ Smoke tests passed"

  # Note: Full Blender runtime tests (including shape-key safety, operators, flex, bake)
  # must be run manually in Blender 4.0+.
  # - Pure Python: python tests/smoke_test.py
  # - Background Blender: blender --background --python tests/blender_smoke.py
  # See CONTRIBUTING.md for manual GUI verification steps (the only way to fully test shape keys).
